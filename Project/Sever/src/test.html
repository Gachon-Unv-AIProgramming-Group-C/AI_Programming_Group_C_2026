<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpenAI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --text: #e8e8e8;
      --muted: #666;
      --user-bg: #1c1c1c;
      --ai-bg: #111;
      --danger: #ff4d4d;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .logo span { color: var(--muted); font-weight: 400; }

    .model-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      background: var(--border);
      padding: 4px 10px;
      border-radius: 4px;
    }

    /* ── API Key Bar ── */
    #api-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #api-bar label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    #api-key-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #api-key-input:focus { border-color: var(--accent); }
    #api-key-input::placeholder { color: var(--muted); }

    .key-status {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
      color: var(--muted);
    }

    .key-status.ok { color: var(--accent); }
    .key-status.err { color: var(--danger); }

    /* ── Chat Window ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 14px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .msg.user .avatar  { background: var(--accent); color: #000; }
    .msg.ai .avatar    { background: var(--border); color: var(--muted); }

    .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.7;
      max-width: calc(100% - 46px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border-color: #333;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 16px 18px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0.35;
      pointer-events: none;
    }

    #empty-state .big {
      font-size: 42px;
    }

    #empty-state p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Input Area ── */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #000;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #send-btn:not(:disabled):hover { opacity: 0.85; }
    #send-btn:not(:disabled):active { transform: scale(0.95); }

    #send-btn svg { width: 18px; height: 18px; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── Error toast ── */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--danger);
      color: #fff;
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 8px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">GPT<span>_chat</span></div>
  <select id="model-select" class="model-badge" style="background:var(--border);border:none;color:var(--muted);cursor:pointer;outline:none;">
    <option value="gpt-4o">gpt-4o</option>
    <option value="gpt-4o-mini">gpt-4o-mini</option>
    <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
  </select>
</header>

<div id="api-bar">
  <label>API KEY</label>
  <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off" />
  <span id="key-status" class="key-status">● 미입력</span>
</div>

<div id="chat-window">
  <div id="empty-state">
    <div class="big">⌘</div>
    <p>API 키를 입력하고 대화를 시작하세요</p>
  </div>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="hint">Enter 전송 · Shift+Enter 줄바꿈</div>
</div>

<div id="toast"></div>

<script>
  // ── State ──
  const history = []; // { role, content }[]
  let isLoading = false;

  // ── Elements ──
  const chatWindow   = document.getElementById('chat-window');
  const emptyState   = document.getElementById('empty-state');
  const apiKeyInput  = document.getElementById('api-key-input');
  const keyStatus    = document.getElementById('key-status');
  const userInput    = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const modelSelect  = document.getElementById('model-select');
  const toast        = document.getElementById('toast');

  // ── API Key handling ──
  apiKeyInput.addEventListener('input', () => {
    const val = apiKeyInput.value.trim();
    if (val.startsWith('sk-') && val.length > 20) {
      keyStatus.textContent = '● 입력됨';
      keyStatus.className = 'key-status ok';
      sendBtn.disabled = false;
    } else if (val.length === 0) {
      keyStatus.textContent = '● 미입력';
      keyStatus.className = 'key-status';
      sendBtn.disabled = true;
    } else {
      keyStatus.textContent = '● 형식 오류';
      keyStatus.className = 'key-status err';
      sendBtn.disabled = true;
    }
  });

  // ── Auto-resize textarea ──
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
  });

  // ── Keyboard send ──
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled && !isLoading) send();
    }
  });

  sendBtn.addEventListener('click', () => { if (!isLoading) send(); });

  // ── Render message ──
  function addMessage(role, content) {
    if (emptyState) emptyState.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'YOU' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    msg.appendChild(avatar);
    msg.appendChild(풍선껌);
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
  }

  // ── Typing indicator ──
  function showTyping() {
    if (emptyState) emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'msg ai typing';
    msg.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    msg.appendChild(avatar);
    msg.appendChild(풍선껌);
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Toast ──
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  // ── Send ──
  async function send() {
    const text = userInput.value.trim();
    if (!text) return;

    const apiKey = apiKeyInput.value.trim();
    const model  = modelSelect.value;

    // Add to UI + history
    addMessage('user', text);
    history.push({ role: 'user', content: text });

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    isLoading = true;
    showTyping();

    try {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model,
          messages: history,
          max_tokens: 1000,
          temperature: 0.7
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content ?? '(응답 없음)';

      history.push({ role: 'assistant', content: reply });
      hideTyping();
      addMessage('ai', reply);

    } catch (e) {
      hideTyping();
      showToast('오류: ' + e.message);
      history.pop(); // remove failed user message from history
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  }
</script>
</body>
</html>
