version: '3.8'

services:
  hallucination-detector:
    build: .
    container_name: hallucination-detector
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
      - LOG_LEVEL=debug
    restart: unless-stopped
