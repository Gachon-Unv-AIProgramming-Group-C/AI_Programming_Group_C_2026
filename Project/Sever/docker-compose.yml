version: '3.8'

services:
  nli-server:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: nli-server
    ports:
      - "8001:8001"
    environment:
      - HF_STAGE2_MODEL_ID=${HF_STAGE2_MODEL_ID:-serize/klue-roberta-base-nli-stage2}
      - HF_API_KEY=${HF_API_KEY}
      - NLI_SERVER_PORT=8001
    volumes:
      - nli-model-cache:/app/local-qwen-paraphraser
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  hallucination-detector:
    build: .
    container_name: hallucination-detector
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
      - HF_MODEL_ID=${HF_MODEL_ID:-jhgan/ko-sroberta-nli}
      - HF_STAGE2_MODEL_ID=${HF_STAGE2_MODEL_ID:-serize/klue-roberta-base-nli-stage2}
      - NLI_SERVER_URL=http://nli-server:8001
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      nli-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nli-model-cache:
